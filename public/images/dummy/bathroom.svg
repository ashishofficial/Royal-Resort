      <path d="M-50 -130 L-50 -80 M50 -130 L50 -80"/>
    </g>
  </g>
  <text x="800" y="780" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-size="78" fill="#fff" font-style="italic">Attached Bathroom</text>
