<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Attached bathroom placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2b25"/>
      <stop offset="0.55" stop-color="#2f6a55"/>
      <stop offset="1" stop-color="#091a16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.3" r="0.55">
      <stop offset="0" stop-color="#e6f0e0" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M0 80 L80 80 M80 0 L80 80" stroke="#d8b675" stroke-width="0.5" stroke-opacity="0.14"/>
    </pattern>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
