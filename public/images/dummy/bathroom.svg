  <rect width="1600" height="1200" fill="url(#glow)"/>
  <g stroke="#d8b675" stroke-width="1.4" fill="none" opacity="0.5">
    <rect x="80" y="80" width="1440" height="1040" rx="6"/>
    <rect x="110" y="110" width="1380" height="980" rx="4" stroke-width="0.5" opacity="0.55"/>
  </g>
  <g transform="translate(800 500)" fill="none" stroke="#d8b675" stroke-width="2.4" stroke-linecap="round">
    <circle cx="0" cy="-120" r="40"/>
    <path d="M0 -80 L0 -10"/>
    <path d="M-90 0 L90 0 L70 100 L-70 100 Z"/>
    <g stroke-width="1.8" opacity="0.7">
